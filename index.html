<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colony Clash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1A1008;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
canvas {
  image-rendering: pixelated;
  max-width: 100vw;
  max-height: 100vh;
  object-fit: contain;
}
</style>
</head>
<body>
<canvas id="game" width="672" height="528"></canvas>
<script>
// ─── Constants ───────────────────────────────────────────────
const COLS = 28, ROWS = 22, TILE = 24;
const W = COLS * TILE, H = ROWS * TILE;
const COLORS = {
  bg:       '#2A1E10',
  dirt:     '#5C4023',
  dirtBord: '#7A5A38',
  rock:     '#6B6B6B',
  rockHi:   '#8A8A8A',
  puddle:   '#2855A0',
  leaf:     '#3A6828',
  dug:      '#332810',
  p1:       '#3066C8',
  p2:       '#C83030',
  moundGold:'#E8C840',
  termite:  '#C87830',
  beetle:   '#6830A0',
  swarm:    '#888888',
  powerUp:  '#E8C840',
};

// Tile types
const T = { DIRT: 0, ROCK: 1, PUDDLE: 2, LEAF: 3, DUG: 4, TUNNEL: 5 };

// ─── Canvas ──────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ─── Input ───────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Game State ──────────────────────────────────────────────
const STATE = { TITLE: 0, GENERATING: 1, COUNTDOWN: 2, PLAYING: 3, ROUND_END: 4, MATCH_END: 5 };
let gameState = STATE.TITLE;
let map = [];
let queens = [];
let bullets = [];
let particles = [];
let soldiers = [];
let mound = null;
let powerUp = null;
let roundNum = 0;
let scores = [0, 0];
let roundTimer = 0;
let countdownTimer = 0;
let roundEndTimer = 0;
let roundWinner = -1;
let moundTimer = 0;
let powerUpTimer = 0;
let waveTimer = 0;
let waveCount = 0;

// ─── Map Generation ──────────────────────────────────────────
function generateMap() {
  map = [];
  for (let y = 0; y < ROWS; y++) {
    map[y] = [];
    for (let x = 0; x < COLS; x++) {
      map[y][x] = T.DIRT;
    }
  }

  // Queen chambers — 3x3 clear zones
  const p1cx = 3, p1cy = ROWS - 4;
  const p2cx = COLS - 4, p2cy = 3;
  clearChamber(p1cx, p1cy);
  clearChamber(p2cx, p2cy);

  // Rock clusters (4 clusters of 2-4 rocks)
  for (let c = 0; c < 4; c++) {
    let rx, ry;
    do {
      rx = 2 + Math.floor(Math.random() * (COLS - 4));
      ry = 2 + Math.floor(Math.random() * (ROWS - 4));
    } while (nearChamber(rx, ry, p1cx, p1cy) || nearChamber(rx, ry, p2cx, p2cy));
    const size = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < size; i++) {
      const ox = rx + Math.floor(Math.random() * 2);
      const oy = ry + Math.floor(Math.random() * 2);
      if (ox >= 0 && ox < COLS && oy >= 0 && oy < ROWS) map[oy][ox] = T.ROCK;
    }
  }

  // Carve tunnel corridor connecting chambers
  carveTunnel(p1cx, p1cy, p2cx, p2cy);

  // Puddles (4-6)
  const numPuddles = 4 + Math.floor(Math.random() * 3);
  for (let i = 0; i < numPuddles; i++) {
    let px, py;
    do {
      px = 1 + Math.floor(Math.random() * (COLS - 2));
      py = 1 + Math.floor(Math.random() * (ROWS - 2));
    } while (map[py][px] !== T.DIRT || nearChamber(px, py, p1cx, p1cy) || nearChamber(px, py, p2cx, p2cy));
    map[py][px] = T.PUDDLE;
  }

  // Leaf litter (3-5)
  const numLeaves = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < numLeaves; i++) {
    let lx, ly;
    do {
      lx = Math.floor(Math.random() * COLS);
      ly = Math.floor(Math.random() * ROWS);
    } while (map[ly][lx] !== T.DUG);
    map[ly][lx] = T.LEAF;
  }

  // BFS validation
  if (!bfsConnected(p1cx, p1cy, p2cx, p2cy)) {
    carveTunnel(p1cx, p1cy, p2cx, p2cy);
  }

  return { p1: { x: p1cx, y: p1cy }, p2: { x: p2cx, y: p2cy } };
}

function clearChamber(cx, cy) {
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++)
      if (cy+dy >= 0 && cy+dy < ROWS && cx+dx >= 0 && cx+dx < COLS)
        map[cy+dy][cx+dx] = T.DUG;
}

function nearChamber(x, y, cx, cy) {
  return Math.abs(x - cx) <= 2 && Math.abs(y - cy) <= 2;
}

function carveTunnel(x1, y1, x2, y2) {
  let x = x1, y = y1;
  while (x !== x2 || y !== y2) {
    if (map[y][x] === T.DIRT) map[y][x] = T.DUG;
    if (Math.random() < 0.5) {
      // Add some width to tunnel
      if (y-1 >= 0 && map[y-1][x] === T.DIRT && Math.random() < 0.3) map[y-1][x] = T.DUG;
      if (y+1 < ROWS && map[y+1][x] === T.DIRT && Math.random() < 0.3) map[y+1][x] = T.DUG;
    }
    if (x !== x2 && (y === y2 || Math.random() < 0.5)) {
      x += x < x2 ? 1 : -1;
    } else if (y !== y2) {
      y += y < y2 ? 1 : -1;
    }
  }
  if (map[y][x] === T.DIRT) map[y][x] = T.DUG;
}

function bfsConnected(x1, y1, x2, y2) {
  const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  const queue = [[x1, y1]];
  visited[y1][x1] = true;
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  while (queue.length > 0) {
    const [cx, cy] = queue.shift();
    if (cx === x2 && cy === y2) return true;
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited[ny][nx]) {
        const t = map[ny][nx];
        if (t !== T.ROCK && t !== T.PUDDLE && t !== T.DIRT) {
          visited[ny][nx] = true;
          queue.push([nx, ny]);
        }
      }
    }
  }
  return false;
}

// ─── Queen Creation ──────────────────────────────────────────
function createQueen(x, y, colony, controls) {
  return {
    x, y, dir: 'right', hp: 3, speed: 3, colony,
    controls, canShoot: true, shootCooldown: 0,
    bobPhase: 0, moving: false, invTimer: 0,
    activePowerUp: null, powerUpTimer: 0, megaShots: 0,
  };
}

// ─── Bullet Creation ─────────────────────────────────────────
function fireBullet(q) {
  const dx = { left: -1, right: 1, up: 0, down: 0 }[q.dir];
  const dy = { left: 0, right: 0, up: -1, down: 1 }[q.dir];
  const bx = q.x + dx, by = q.y + dy;
  if (bx < 0 || bx >= COLS || by < 0 || by >= ROWS) return;
  const t = map[by][bx];
  if (t === T.ROCK || t === T.PUDDLE) return;

  const speed = 5;
  const blast = q.activePowerUp === 'MEGA' ? 3 : 1;

  if (q.activePowerUp === 'RAPID') {
    // 3 projectiles in a spread
    const spreads = [
      { dx, dy },
      { dx: dx === 0 ? -1 : dx, dy: dy === 0 ? -1 : dy },
      { dx: dx === 0 ? 1 : dx, dy: dy === 0 ? 1 : dy },
    ];
    for (const s of spreads) {
      bullets.push({ x: q.x + 0.5, y: q.y + 0.5, dx: s.dx, dy: s.dy, speed, owner: q.colony, blast });
    }
  } else {
    bullets.push({ x: q.x + 0.5, y: q.y + 0.5, dx, dy, speed, owner: q.colony, blast });
  }

  if (q.activePowerUp === 'MEGA') {
    q.megaShots--;
    if (q.megaShots <= 0) { q.activePowerUp = null; q.powerUpTimer = 0; }
  }
}

// ─── Particles ───────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 30 + Math.random() * 60;
    particles.push({
      x: x * TILE + TILE / 2, y: y * TILE + TILE / 2,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 0.3 + Math.random() * 0.4, color, size: 2 + Math.random() * 3,
    });
  }
}

// ─── Update ──────────────────────────────────────────────────
function update(dt) {
  if (gameState === STATE.TITLE) {
    if (Object.values(keys).some(v => v)) {
      gameState = STATE.GENERATING;
    }
    return;
  }

  if (gameState === STATE.GENERATING) {
    startNewRound();
    return;
  }

  if (gameState === STATE.COUNTDOWN) {
    countdownTimer -= dt;
    if (countdownTimer <= 0) gameState = STATE.PLAYING;
    return;
  }

  if (gameState === STATE.ROUND_END) {
    roundEndTimer -= dt;
    if (roundEndTimer <= 0) {
      if (scores[0] >= 3 || scores[1] >= 3) {
        gameState = STATE.MATCH_END;
      } else {
        gameState = STATE.GENERATING;
      }
    }
    return;
  }

  if (gameState === STATE.MATCH_END) {
    if (Object.values(keys).some(v => v)) {
      scores = [0, 0];
      roundNum = 0;
      gameState = STATE.TITLE;
      // Clear all keys to prevent immediate restart
      for (const k in keys) keys[k] = false;
    }
    return;
  }

  if (gameState !== STATE.PLAYING) return;

  roundTimer += dt;

  // Update queens
  for (const q of queens) {
    updateQueen(q, dt);
  }

  // Update bullets
  updateBullets(dt);

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update soldiers
  updateSoldiers(dt);

  // Spawn mound logic
  updateMound(dt);

  // Power-up logic
  updatePowerUp(dt);

  // Check win condition
  for (let i = 0; i < queens.length; i++) {
    if (queens[i].hp <= 0) {
      roundWinner = 1 - i;
      scores[roundWinner]++;
      spawnParticles(queens[i].x, queens[i].y, queens[i].colony === 'blue' ? COLORS.p1 : COLORS.p2, 30);
      gameState = STATE.ROUND_END;
      roundEndTimer = 3;
      return;
    }
  }
}

function updateQueen(q, dt) {
  const c = q.controls;
  let mx = 0, my = 0;
  if (keys[c.up]) { my = -1; q.dir = 'up'; }
  if (keys[c.down]) { my = 1; q.dir = 'down'; }
  if (keys[c.left]) { mx = -1; q.dir = 'left'; }
  if (keys[c.right]) { mx = 1; q.dir = 'right'; }

  q.moving = mx !== 0 || my !== 0;
  if (q.moving) q.bobPhase += dt * 10;

  const speed = q.activePowerUp === 'SUGAR' ? q.speed * 2 : q.speed;

  if (mx !== 0) {
    const nx = q.x + mx * speed * dt;
    const tileX = Math.round(nx);
    if (tileX >= 0 && tileX < COLS && canWalk(tileX, Math.round(q.y))) {
      q.x = nx;
    }
  }
  if (my !== 0) {
    const ny = q.y + my * speed * dt;
    const tileY = Math.round(ny);
    if (tileY >= 0 && tileY < ROWS && canWalk(Math.round(q.x), tileY)) {
      q.y = ny;
    }
  }

  // Clamp
  q.x = Math.max(0, Math.min(COLS - 1, q.x));
  q.y = Math.max(0, Math.min(ROWS - 1, q.y));

  // Shoot cooldown
  q.shootCooldown -= dt;
  if (keys[c.shoot] && q.shootCooldown <= 0) {
    fireBullet(q);
    q.shootCooldown = 0.3;
  }

  // Invincibility timer
  if (q.invTimer > 0) q.invTimer -= dt;

  // Power-up timer
  if (q.activePowerUp && q.activePowerUp !== 'MEGA' && q.activePowerUp !== 'SHIELD') {
    q.powerUpTimer -= dt;
    if (q.powerUpTimer <= 0) { q.activePowerUp = null; }
  }

  // Check spawn mound claim
  if (mound && mound.state === 'ACTIVE') {
    if (Math.round(q.x) === mound.x && Math.round(q.y) === mound.y) {
      mound.state = 'CLAIMED';
      mound.claimedBy = q.colony;
      mound.soldiersRemaining = 3;
      mound.spawnTimer = 0.5;
    }
  }

  // Check power-up collection
  if (powerUp) {
    if (Math.round(q.x) === powerUp.x && Math.round(q.y) === powerUp.y) {
      applyPowerUp(q, powerUp);
      powerUp = null;
    }
  }
}

function canWalk(tx, ty) {
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return false;
  const t = map[ty][tx];
  return t === T.DUG || t === T.TUNNEL || t === T.LEAF;
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.dx * b.speed * dt;
    b.y += b.dy * b.speed * dt;

    const tx = Math.floor(b.x), ty = Math.floor(b.y);

    // Out of bounds
    if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) {
      bullets.splice(i, 1);
      continue;
    }

    // Hit terrain
    const tile = map[ty][tx];
    if (tile === T.ROCK || tile === T.PUDDLE) {
      bullets.splice(i, 1);
      continue;
    }
    if (tile === T.DIRT) {
      // Destroy dirt
      if (b.blast >= 3) {
        for (let dy = -1; dy <= 1; dy++)
          for (let dx = -1; dx <= 1; dx++) {
            const nx = tx + dx, ny = ty + dy;
            if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && map[ny][nx] === T.DIRT) {
              map[ny][nx] = T.DUG;
              spawnParticles(nx, ny, COLORS.dirtBord, 3);
            }
          }
      } else {
        map[ty][tx] = T.DUG;
        spawnParticles(tx, ty, COLORS.dirtBord, 5);
      }
      bullets.splice(i, 1);
      continue;
    }

    // Hit queens
    for (const q of queens) {
      if (q.colony !== b.owner && q.invTimer <= 0) {
        if (Math.abs(q.x - b.x + 0.5) < 0.6 && Math.abs(q.y - b.y + 0.5) < 0.6) {
          if (q.activePowerUp === 'SHIELD') {
            q.activePowerUp = null;
          } else {
            q.hp--;
            q.invTimer = 0.5;
          }
          spawnParticles(Math.round(q.x), Math.round(q.y), q.colony === 'blue' ? COLORS.p1 : COLORS.p2, 8);
          bullets.splice(i, 1);
          break;
        }
      }
    }

    // Hit soldiers
    for (let s = soldiers.length - 1; s >= 0; s--) {
      const sol = soldiers[s];
      if (sol.colony !== b.owner) {
        if (Math.abs(sol.x - b.x + 0.5) < 0.6 && Math.abs(sol.y - b.y + 0.5) < 0.6) {
          spawnParticles(Math.round(sol.x), Math.round(sol.y), sol.colony === 'blue' ? COLORS.p1 : COLORS.p2, 5);
          soldiers.splice(s, 1);
          bullets.splice(i, 1);
          break;
        }
      }
    }
  }
}

// ─── Soldiers ────────────────────────────────────────────────
function updateSoldiers(dt) {
  for (let i = soldiers.length - 1; i >= 0; i--) {
    const s = soldiers[i];
    s.lifetime -= dt;
    if (s.lifetime <= 0) {
      soldiers.splice(i, 1);
      continue;
    }

    // Find enemy queen
    const enemy = queens.find(q => q.colony !== s.colony);
    if (!enemy) continue;

    // BFS pathfind every 2 seconds
    s.pathTimer -= dt;
    if (s.pathTimer <= 0 || !s.nextTile) {
      s.pathTimer = 2;
      const path = bfsPath(Math.round(s.x), Math.round(s.y), Math.round(enemy.x), Math.round(enemy.y));
      s.nextTile = path;
    }

    // Move toward next tile
    if (s.nextTile) {
      const dx = s.nextTile.x - s.x;
      const dy = s.nextTile.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 0.1) {
        s.x = s.nextTile.x;
        s.y = s.nextTile.y;
        const path = bfsPath(Math.round(s.x), Math.round(s.y), Math.round(enemy.x), Math.round(enemy.y));
        s.nextTile = path;
      } else {
        s.x += (dx / dist) * s.speed * dt;
        s.y += (dy / dist) * s.speed * dt;
        // Update direction for rendering
        if (Math.abs(dx) > Math.abs(dy)) s.dir = dx > 0 ? 'right' : 'left';
        else s.dir = dy > 0 ? 'down' : 'up';
      }
    }

    // Shoot at enemy queen if close and in line
    s.shootCooldown -= dt;
    if (s.shootCooldown <= 0) {
      const edx = Math.round(enemy.x) - Math.round(s.x);
      const edy = Math.round(enemy.y) - Math.round(s.y);
      if ((edx === 0 && Math.abs(edy) <= 5) || (edy === 0 && Math.abs(edx) <= 5)) {
        const bdir = edx === 0 ? (edy > 0 ? 'down' : 'up') : (edx > 0 ? 'right' : 'left');
        const bdx = { left: -1, right: 1, up: 0, down: 0 }[bdir];
        const bdy = { left: 0, right: 0, up: -1, down: 1 }[bdir];
        bullets.push({ x: s.x + 0.5, y: s.y + 0.5, dx: bdx, dy: bdy, speed: 5, owner: s.colony, blast: 1 });
        s.shootCooldown = 1.5;
      }
    }
  }
}

function bfsPath(sx, sy, ex, ey) {
  const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  const parent = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  const queue = [[sx, sy]];
  visited[sy][sx] = true;
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  while (queue.length > 0) {
    const [cx, cy] = queue.shift();
    if (cx === ex && cy === ey) {
      // Trace back to find first step
      let px = ex, py = ey;
      while (parent[py][px]) {
        const [ppx, ppy] = parent[py][px];
        if (ppx === sx && ppy === sy) return { x: px, y: py };
        px = ppx;
        py = ppy;
      }
      return { x: ex, y: ey };
    }
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited[ny][nx]) {
        const t = map[ny][nx];
        if (t !== T.ROCK && t !== T.PUDDLE && t !== T.DIRT) {
          visited[ny][nx] = true;
          parent[ny][nx] = [cx, cy];
          queue.push([nx, ny]);
        }
      }
    }
  }
  return null;
}

// ─── Spawn Mounds ────────────────────────────────────────────
function updateMound(dt) {
  moundTimer -= dt;

  if (mound) {
    if (mound.state === 'ACTIVE') {
      mound.activeTimer -= dt;
      if (mound.activeTimer <= 0) {
        mound = null;
        moundTimer = 5 + Math.random() * 5;
      }
    } else if (mound.state === 'CLAIMED') {
      mound.spawnTimer -= dt;
      if (mound.spawnTimer <= 0 && mound.soldiersRemaining > 0) {
        // Spawn soldier
        soldiers.push({
          x: mound.x, y: mound.y, dir: 'up', hp: 1, speed: 3.5,
          colony: mound.claimedBy, lifetime: 20, pathTimer: 0,
          nextTile: null, shootCooldown: 1,
        });
        mound.soldiersRemaining--;
        mound.spawnTimer = 2.5;
      }
      if (mound.soldiersRemaining <= 0 && mound.spawnTimer <= 0) {
        mound = null;
        moundTimer = 5 + Math.random() * 5;
      }
    }
  } else if (moundTimer <= 0 && roundTimer > 5) {
    // Spawn new mound
    let mx, my, attempts = 0;
    do {
      mx = Math.floor(Math.random() * COLS);
      my = Math.floor(Math.random() * ROWS);
      attempts++;
    } while (attempts < 100 && (map[my][mx] !== T.DUG ||
      (Math.abs(mx - queens[0].x) + Math.abs(my - queens[0].y) < 5) ||
      (Math.abs(mx - queens[1].x) + Math.abs(my - queens[1].y) < 5)));

    if (attempts < 100) {
      mound = { x: mx, y: my, state: 'ACTIVE', claimedBy: null, soldiersRemaining: 0, spawnTimer: 0, activeTimer: 10 };
    }
    moundTimer = 5 + Math.random() * 5;
  }
}

// ─── Power-Ups ───────────────────────────────────────────────
const POWER_TYPES = ['SUGAR', 'RAPID', 'SHIELD', 'MEGA'];

function updatePowerUp(dt) {
  powerUpTimer -= dt;

  if (powerUp) {
    powerUp.despawnTimer -= dt;
    if (powerUp.despawnTimer <= 0) {
      powerUp = null;
      powerUpTimer = 15;
    }
  } else if (powerUpTimer <= 0 && roundTimer > 10) {
    let px, py, attempts = 0;
    do {
      px = Math.floor(Math.random() * COLS);
      py = Math.floor(Math.random() * ROWS);
      attempts++;
    } while (attempts < 100 && map[py][px] !== T.DUG);

    if (attempts < 100) {
      powerUp = {
        x: px, y: py,
        type: POWER_TYPES[Math.floor(Math.random() * POWER_TYPES.length)],
        despawnTimer: 10,
      };
    }
    powerUpTimer = 15;
  }
}

function applyPowerUp(q, pu) {
  q.activePowerUp = pu.type;
  switch (pu.type) {
    case 'SUGAR': q.powerUpTimer = 8; break;
    case 'RAPID': q.powerUpTimer = 8; break;
    case 'SHIELD': break; // lasts until hit or 15s
    case 'MEGA': q.megaShots = 3; break;
  }
}

// ─── Start Round ─────────────────────────────────────────────
function startNewRound() {
  roundNum++;
  bullets = [];
  particles = [];
  soldiers = [];
  mound = null;
  powerUp = null;
  roundTimer = 0;
  moundTimer = 5;
  powerUpTimer = 15;
  waveTimer = 30;
  waveCount = 0;

  const spawns = generateMap();

  queens = [
    createQueen(spawns.p1.x, spawns.p1.y, 'blue', {
      up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', shoot: 'Space'
    }),
    createQueen(spawns.p2.x, spawns.p2.y, 'red', {
      up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', shoot: 'Enter'
    }),
  ];

  countdownTimer = 3;
  gameState = STATE.COUNTDOWN;
}

// ─── Drawing ─────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  if (gameState === STATE.TITLE) {
    drawTitle();
    return;
  }

  if (gameState === STATE.MATCH_END) {
    drawMatchEnd();
    return;
  }

  // Draw map
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const t = map[y][x];
      const px = x * TILE, py = y * TILE;

      if (t === T.DIRT) {
        ctx.fillStyle = COLORS.dirt;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.strokeStyle = COLORS.dirtBord;
        ctx.lineWidth = 1;
        ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
        // Grain lines
        ctx.strokeStyle = COLORS.dirtBord;
        ctx.beginPath();
        ctx.moveTo(px + 4, py + 8); ctx.lineTo(px + 12, py + 8);
        ctx.moveTo(px + 10, py + 16); ctx.lineTo(px + 20, py + 16);
        ctx.stroke();
      } else if (t === T.ROCK) {
        ctx.fillStyle = COLORS.rock;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 2;
        ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);
        ctx.fillStyle = COLORS.rockHi;
        ctx.fillRect(px + 5, py + 5, 6, 4);
        ctx.fillRect(px + 14, py + 12, 4, 4);
      } else if (t === T.PUDDLE) {
        ctx.fillStyle = COLORS.puddle;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.strokeStyle = '#4080D0';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px + 3, py + 10); ctx.quadraticCurveTo(px + 12, py + 6, px + 21, py + 10);
        ctx.stroke();
      } else if (t === T.LEAF) {
        ctx.fillStyle = COLORS.dug;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = COLORS.leaf;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.ellipse(px + 8, py + 10, 6, 4, 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(px + 16, py + 16, 5, 3, -0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (t === T.DUG || t === T.TUNNEL) {
        ctx.fillStyle = COLORS.dug;
        ctx.fillRect(px, py, TILE, TILE);
      }
    }
  }

  // Draw spawn mound
  if (mound) {
    const mx = mound.x * TILE, my = mound.y * TILE;
    const pulse = Math.sin(performance.now() / 200) * 0.3 + 0.7;
    if (mound.state === 'ACTIVE') {
      ctx.fillStyle = COLORS.moundGold;
      ctx.globalAlpha = pulse;
      ctx.fillRect(mx + 2, my + 2, TILE - 4, TILE - 4);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = COLORS.moundGold;
      ctx.lineWidth = 2;
      ctx.strokeRect(mx + 1, my + 1, TILE - 2, TILE - 2);
    } else if (mound.state === 'CLAIMED') {
      const col = mound.claimedBy === 'blue' ? COLORS.p1 : COLORS.p2;
      ctx.fillStyle = COLORS.moundGold;
      ctx.fillRect(mx + 2, my + 2, TILE - 4, TILE - 4);
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.strokeRect(mx + 1, my + 1, TILE - 2, TILE - 2);
    }
  }

  // Draw power-up
  if (powerUp) {
    const px = powerUp.x * TILE, py = powerUp.y * TILE;
    const pulse = Math.sin(performance.now() / 250) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = COLORS.powerUp;
    ctx.beginPath();
    ctx.arc(px + TILE / 2, py + TILE / 2, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Type indicator
    ctx.fillStyle = '#000';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    const label = { SUGAR: 'S', RAPID: 'R', SHIELD: 'A', MEGA: 'M' }[powerUp.type];
    ctx.fillText(label, px + TILE / 2, py + TILE / 2 + 3);
  }

  // Draw soldiers
  for (const s of soldiers) {
    drawAnt(s.x, s.y, s.dir, s.colony === 'blue' ? COLORS.p1 : COLORS.p2, 0.7, s.lifetime < 3 ? 0.5 : 1);
  }

  // Draw queens
  for (const q of queens) {
    if (q.invTimer > 0 && Math.floor(q.invTimer * 10) % 2 === 0) continue;
    const col = q.colony === 'blue' ? COLORS.p1 : COLORS.p2;

    // Glow
    ctx.save();
    ctx.shadowColor = col;
    ctx.shadowBlur = 12;
    drawAnt(q.x, q.y, q.dir, col, 1, 1, true, q.bobPhase, q.hp);
    ctx.restore();

    // Shield indicator
    if (q.activePowerUp === 'SHIELD') {
      ctx.strokeStyle = '#88DDFF';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(q.x * TILE + TILE / 2, q.y * TILE + TILE / 2, 14, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Draw bullets
  for (const b of bullets) {
    ctx.fillStyle = '#88FF44';
    ctx.beginPath();
    ctx.arc(b.x * TILE, b.y * TILE, b.blast >= 3 ? 5 : 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 0.7;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Draw HUD
  drawHUD();

  // Countdown overlay
  if (gameState === STATE.COUNTDOWN) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 64px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(Math.ceil(countdownTimer), W / 2, H / 2 + 20);
    ctx.font = '18px monospace';
    ctx.fillText('ROUND ' + roundNum, W / 2, H / 2 - 50);
  }

  // Round end overlay
  if (gameState === STATE.ROUND_END) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    const winCol = roundWinner === 0 ? COLORS.p1 : COLORS.p2;
    const loser = roundWinner === 0 ? 'RED' : 'BLUE';
    ctx.fillStyle = winCol;
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(loser + ' COLONY FALLS', W / 2, H / 2 - 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('P' + (roundWinner + 1) + ' WINS THE ROUND', W / 2, H / 2 + 20);
    ctx.font = '16px monospace';
    ctx.fillText(scores[0] + ' - ' + scores[1], W / 2, H / 2 + 55);
  }
}

function drawAnt(x, y, dir, color, scale, alpha, isQueen, bobPhase, hp) {
  const px = x * TILE + TILE / 2;
  const py = y * TILE + TILE / 2 + (bobPhase ? Math.sin(bobPhase) * 1.5 : 0);
  const s = TILE * 0.4 * scale;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(px, py);

  // Rotate based on direction
  const angles = { right: 0, down: Math.PI / 2, left: Math.PI, up: -Math.PI / 2 };
  ctx.rotate(angles[dir] || 0);

  // Body segments
  ctx.fillStyle = color;
  // Abdomen
  ctx.beginPath();
  ctx.ellipse(-s * 0.8, 0, s * 0.5, s * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Thorax
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.35, s * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.ellipse(s * 0.6, 0, s * 0.35, s * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * s * 0.3, -s * 0.3);
    ctx.lineTo(i * s * 0.3 - 2, -s * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(i * s * 0.3, s * 0.3);
    ctx.lineTo(i * s * 0.3 - 2, s * 0.7);
    ctx.stroke();
  }

  // Antennae
  ctx.beginPath();
  ctx.moveTo(s * 0.8, -s * 0.2);
  ctx.lineTo(s * 1.3, -s * 0.6);
  ctx.moveTo(s * 0.8, s * 0.2);
  ctx.lineTo(s * 1.3, s * 0.6);
  ctx.stroke();

  if (isQueen) {
    // Crown/mandibles
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(s * 0.9, -s * 0.15);
    ctx.lineTo(s * 1.1, -s * 0.4);
    ctx.lineTo(s * 1.0, -s * 0.1);
    ctx.lineTo(s * 1.2, -s * 0.2);
    ctx.fill();

    // Damage cracks
    if (hp !== undefined && hp < 3) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      if (hp <= 2) {
        ctx.beginPath();
        ctx.moveTo(-s * 0.4, -s * 0.2);
        ctx.lineTo(-s * 0.1, s * 0.1);
        ctx.stroke();
      }
      if (hp <= 1) {
        ctx.beginPath();
        ctx.moveTo(s * 0.2, -s * 0.3);
        ctx.lineTo(s * 0.5, s * 0.2);
        ctx.lineTo(s * 0.3, s * 0.1);
        ctx.stroke();
      }
    }
  }

  ctx.restore();
}

function drawHUD() {
  // P1 HP
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = COLORS.p1;
  let hpText = 'P1: ';
  for (let i = 0; i < queens[0].hp; i++) hpText += '\u2665';
  ctx.fillText(hpText, 8, 18);
  if (queens[0].activePowerUp) {
    ctx.fillStyle = COLORS.powerUp;
    ctx.fillText('[' + queens[0].activePowerUp + ']', 100, 18);
  }

  // P2 HP
  ctx.textAlign = 'right';
  ctx.fillStyle = COLORS.p2;
  hpText = 'P2: ';
  for (let i = 0; i < queens[1].hp; i++) hpText += '\u2665';
  ctx.fillText(hpText, W - 8, 18);
  if (queens[1].activePowerUp) {
    ctx.fillStyle = COLORS.powerUp;
    ctx.fillText('[' + queens[1].activePowerUp + ']', W - 100, 18);
  }

  // Round + score
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ccc';
  ctx.fillText('ROUND ' + roundNum + '  \u00B7  ' + scores[0] + '-' + scores[1], W / 2, 18);

  // Control hints
  ctx.font = '10px monospace';
  ctx.fillStyle = '#666';
  ctx.textAlign = 'left';
  ctx.fillText('WASD+SPACE', 8, H - 8);
  ctx.textAlign = 'right';
  ctx.fillText('ARROWS+ENTER', W - 8, H - 8);
}

function drawTitle() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = COLORS.moundGold;
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('COLONY CLASH', W / 2, H / 2 - 40);

  ctx.fillStyle = '#999';
  ctx.font = '16px monospace';
  ctx.fillText('Queen vs. Queen \u2014 An Ant Colony Battle Arena', W / 2, H / 2 + 10);

  const blink = Math.sin(performance.now() / 500) > 0;
  if (blink) {
    ctx.fillStyle = '#ccc';
    ctx.font = '14px monospace';
    ctx.fillText('PRESS ANY KEY TO START', W / 2, H / 2 + 60);
  }

  ctx.fillStyle = COLORS.p1;
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('P1: WASD + SPACE', W / 2 - 150, H / 2 + 110);
  ctx.fillStyle = COLORS.p2;
  ctx.textAlign = 'right';
  ctx.fillText('P2: ARROWS + ENTER', W / 2 + 150, H / 2 + 110);
}

function drawMatchEnd() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  const winner = scores[0] >= 3 ? 0 : 1;
  const col = winner === 0 ? COLORS.p1 : COLORS.p2;

  ctx.fillStyle = col;
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('P' + (winner + 1) + ' WINS!', W / 2, H / 2 - 30);

  ctx.fillStyle = '#ccc';
  ctx.font = '22px monospace';
  ctx.fillText(scores[0] + ' - ' + scores[1], W / 2, H / 2 + 20);

  const blink = Math.sin(performance.now() / 500) > 0;
  if (blink) {
    ctx.fillStyle = '#999';
    ctx.font = '14px monospace';
    ctx.fillText('PRESS ANY KEY TO RESTART', W / 2, H / 2 + 70);
  }
}

// ─── Game Loop ───────────────────────────────────────────────
let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  update(dt);
  draw();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
